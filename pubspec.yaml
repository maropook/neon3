name: neon3
description: A new Flutter project.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.18.6 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # firebase_analytics: ^10.0.6
  firebase_auth: ^4.1.3
  firebase_core: ^2.3.0
  # firebase_crashlytics: ^3.0.6
  # firebase_messaging: ^14.1.1
  firebase_storage: ^11.0.6
  cloud_firestore: ^4.5.0

  flutter_svg: ^1.1.6
  flutter_hooks: ^0.18.0
  freezed_annotation: ^2.4.1
  hooks_riverpod: ^2.1.1
  go_router: ^5.2.2
  url_strategy: ^0.2.0
  camera: ^0.10.3+2
  video_player: ^2.6.0
  image_size_getter: ^2.1.2
  path_provider: ^2.0.13
  flutter_animation_progress_bar: ^2.0.1
  path: ^1.8.2
  permission_handler: ^8.1.2
  intl: ^0.17.0
  record: ^4.4.0
  audioplayers: ^1.0.1
  image_picker: ^0.8.5
  image_cropper: ^2.0.3
  uuid: ^3.0.6
  cached_network_image: ^3.0.0
  bordered_text: ^2.0.0
  flutter_easyloading: ^3.0.5
  http: ^0.13.5
  file: ^6.1.4
  image_downloader: ^0.31.0
  file_picker: ^5.2.7
  video_thumbnail: ^0.5.3
  audio_video_progress_bar: ^1.0.1
  flutter_tts: ^3.6.3
  gallery_saver: ^2.3.2
  flutter_colorpicker: ^1.0.3
  flutter_video_info: ^1.3.1

  # neon_video_encoder:
  #   git:
  #     url: https://github.com/ini-siro/neon_video_encoder.git
  #     ref: refs/heads/feature/trim_video
  neon_video_encoder:
    git:
      url: https://github.com/maropook/neon_video_encoder.git
      ref: refs/heads/feature/2024_4_21_build
  neon_speech_to_text:
    git:
      url: https://github.com/maropook/neon_speech_to_text.git
      ref: refs/heads/feature/#1/can_speech_to_text
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_gen_runner: ^5.2.0
  build_runner: ^2.4.9
  freezed: 2.5.2
  json_serializable: ^6.7.1

  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  watcher: ^1.1.0

flutter_icons:
  ios: true
  image_path: "assets/images/launcher/icon_ios.png"
  remove_alpha_ios: true
  android: false

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/icons/
    - assets/movies/
    - assets/audio/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: YasashisaGothicBoldV2-bold
      fonts:
        - asset: assets/fonts/YasashisaGothicBold.otf
    - family: AkazukinPop
      fonts:
        - asset: assets/fonts/AkazukiPOP.otf
    - family: SoukouMincho
      fonts:
        - asset: assets/fonts/SoukouMincho.ttf
    - family: Corporate-Logo-Medium-ver3
      fonts:
        - asset: assets/fonts/Corporate-Logo-Medium-ver3.otf
    - family: Koruri-Regular
      fonts:
        - asset: assets/fonts/Koruri-Regular.ttf

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
